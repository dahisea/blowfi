<script>
(function() {
  var stats = window.__umamiStats;
  if (!stats || !stats.cfg.enable) return;

  var cfg = stats.cfg;

  function spanIdToUrl(id) {
    var raw = id.slice(6);

    if (raw === "home" || raw === "_index.md" || raw === "" || raw === "/") return "/";

    if (raw.startsWith("taxonomy_")) return "/" + raw.slice(9) + "/";

    if (raw.startsWith("term_")) {
      var t = raw.slice(5);
      var parts = t.split("/");
      if (parts.length > 1) return "/" + parts[0] + "/" + parts[1] + "/";
      return "/tags/" + t + "/";
    }

    var p = raw;
    p = p.replace(/(_?index)(\.[a-zA-Z-]+)?\.md$/, "");
    p = p.replace(/\.md$/, "");
    if (!p || p === "/") return "/";
    if (!p.startsWith("/")) p = "/" + p;
    if (!p.endsWith("/")) p = p + "/";
    return p;
  }

  function addLangPrefix(baseWithoutLeading, lang) {
    if (!lang) return null;
    var v = "/" + lang.toLowerCase() + "/" + baseWithoutLeading;
    return v.replace(/\/+/g, "/");
  }

  function makeLangUrls(baseUrl) {
    var urls = [baseUrl];
    if (!cfg.autoSum || !cfg.langCodes.length) return urls;
    var baseWithoutLeading = baseUrl.replace(/^\//, "");

    // default language with prefix (e.g. /zh-tw/path/)
    var dflt = addLangPrefix(baseWithoutLeading, cfg.defaultLang);
    if (dflt && dflt !== baseUrl) urls.push(dflt);

    // other languages with prefix
    for (var i = 0; i < cfg.langCodes.length; i++) {
      var lc = cfg.langCodes[i];
      if (!lc) continue;
      var variant = addLangPrefix(baseWithoutLeading, lc);
      if (variant) urls.push(variant);
    }
    return urls;
  }

  function processSpan(span, websiteId, token) {
    var id = span.getAttribute("id");
    if (!id || !id.startsWith("views_")) return;

    var url = spanIdToUrl(id);
    if (!url) return;

    var urls = makeLangUrls(url);
    var promises = urls.map(function(u) {
      return stats.fetchPageviews(websiteId, token, u)["catch"](function() { return 0; });
    });

    Promise.all(promises).then(function(results) {
      var total = 0;
      for (var i = 0; i < results.length; i++) total += results[i];
      displayViews(span, total);
    })["catch"](function() {
      displayViews(span, 0);
    });
  }

  function displayViews(span, count) {
    ["animate-pulse","text-transparent","bg-neutral-300","dark:bg-neutral-400","inline-block","max-h-3","rounded-full","mt-[-2px]","align-middle"].forEach(function(c) {
      span.classList.remove(c);
    });
    span.textContent = count;
    span.title = "views";
  }

  function scanAndProcess() {
    var spans = document.querySelectorAll('span[id^="views_"][title="views"]');
    if (!spans.length) return;

    stats.getShareToken().then(function(t) {
      spans.forEach(function(span) {
        if (span.textContent.trim() === "loading") {
          processSpan(span, t.websiteId, t.token);
        }
      });
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", scanAndProcess);
  } else {
    scanAndProcess();
  }

  new MutationObserver(function() {
    scanAndProcess();
  }).observe(document.body, { subtree: true, childList: true, attributes: false });
})();

/* ---- geo-block: hide pages/cards for specific countries ---- */
(function() {
  var notsafe = {{ if .Params.notsafeForArea }}{{ .Params.notsafeForArea | jsonify }}{{ else }}null{{ end }};
  var cache = window.__visitorCountry;

  function doBlock(country) {
    if (!country) return;
    // page-level block
    if (notsafe && notsafe.indexOf(country) !== -1) {
      var els = document.querySelectorAll("main, article:first-of-type");
      for (var ei = 0; ei < els.length; ei++) {
        var el = els[ei];
        if (el.querySelector('[data-notsafe]')) continue;
        el.innerHTML = '<div class="p-8 text-center text-neutral-500"><p>⚠️ 内容在当地不可用</p></div>';
      }
    }
    // card-level block
    var cards = document.querySelectorAll('[data-notsafe]');
    for (var ci = 0; ci < cards.length; ci++) {
      try {
        var blocked = JSON.parse(cards[ci].getAttribute('data-notsafe'));
        if (blocked.indexOf(country) !== -1) cards[ci].style.display = 'none';
      } catch(e) {}
    }
  }

  if (cache) {
    doBlock(cache);
  } else {
    fetch('https://www.cloudflare.com/cdn-cgi/trace')
      .then(function(r) { return r.text(); })
      .then(function(text) {
        var m = text.match(/^loc=(.+)$/m);
        var country = m ? m[1].trim() : '';
        window.__visitorCountry = country;
        doBlock(country);
      })
      .catch(function() {});
  }
})();

/* ---- S2T: simplified↔traditional Chinese ---- */
(function() {
  var path = location.pathname;
  var inZhSg = /^\/zh-sg(\/|$)/.test(path);
  var pageIsHant = !inZhSg;
  console.log('[S2T] path=' + path + ' zhSg=' + inZhSg + ' isHant=' + pageIsHant);

  var HANT = 'hant', HANS = 'hans';
  var ctx = { mode: null, maps: null };

  function loadPref() {
    try { var v = JSON.parse(localStorage.getItem('__s2t') || '{}').mode; if (v) ctx.mode = v; } catch(e) {}
  }
  function savePref() { try { localStorage.setItem('__s2t', JSON.stringify({ mode: ctx.mode })); } catch(e) {} }

  loadPref();

  function buildMaps(text) {
    var s2t = {}, t2s = {};
    text.split('\n').forEach(function(line) {
      var p = line.split(','), t = (p[0]||'').trim(), s = (p[1]||'').trim();
      if (t && s && t !== s) { s2t[s] = t; t2s[t] = s; }
    });
    var cnt = Object.keys(s2t).length;
    console.log('[S2T] maps built, ' + cnt + ' pairs');
    ctx.maps = { s2t: s2t, t2s: t2s };
    window.__s2tMaps = ctx.maps;
  }

  function convert(root, map) {
    if (!map) return;
    var stack = [root], el, i, node, text, out, ch;
    while (stack.length) {
      el = stack.pop();
      if (el.nodeType === 3) {
        text = el.nodeValue; out = '';
        for (i = 0; i < text.length; i++) { ch = text[i]; out += map[ch] || ch; }
        if (out !== text) el.nodeValue = out;
      } else if (el.nodeType === 1) {
        if (/^(SCRIPT|STYLE|TEXTAREA|PRE|CODE)$/.test(el.nodeName)) continue;
        node = el.firstChild;
        while (node) { stack.push(node); node = node.nextSibling; }
      }
    }
  }

  function apply(mode) {
    console.log('[S2T] apply mode=' + mode + ' pageIsHant=' + pageIsHant);
    var map = mode === HANT ? ctx.maps.s2t : ctx.maps.t2s;
    var needHide = mode === HANT && map;
    var hideStyle;
    if (needHide) {
      hideStyle = document.createElement('style');
      hideStyle.textContent = 'body{visibility:hidden}';
      document.head.appendChild(hideStyle);
    }
    function run() {
      if (map) convert(document.body, map);
      if (hideStyle) { document.body.style.visibility = 'visible'; hideStyle.remove(); }
      console.log('[S2T] conversion done');
      refreshIndicator();
    }
    if (document.body) run();
    else document.addEventListener('DOMContentLoaded', run);
  }

  function refreshIndicator() {
    var active = defaultMode();
    document.querySelectorAll('#s2t-toggle [data-s2t]').forEach(function(el) {
      el.classList.toggle('font-semibold', el.getAttribute('data-s2t') === active);
    });
  }

  function setupToggle() {
    document.querySelectorAll('#s2t-toggle [data-s2t]').forEach(function(el) {
      el.setAttribute('role','button');
      el.setAttribute('tabindex','0');
      el.addEventListener('click', function() {
        ctx.mode = el.getAttribute('data-s2t');
        savePref();
        apply(ctx.mode);
      });
    });
    refreshIndicator();
  }

  function defaultMode() { return ctx.mode || (pageIsHant ? HANT : HANS); }

  function init(maps) {
    ctx.maps = maps;
    apply(defaultMode());
    document.addEventListener('DOMContentLoaded', setupToggle);
  }

  if (ctx.maps || (window.__s2tMaps && window.__s2tMaps.s2t && window.__s2tMaps.t2s)) {
    console.log('[S2T] using cached maps');
    init(ctx.maps || window.__s2tMaps);
  } else {
    var url = window.__s2tUrl || '/translate-owo.txt';
    console.log('[S2T] fetching maps from ' + url);
    fetch(url)
      .then(function(r) { return r.text(); })
      .then(function(text) { buildMaps(text); init(ctx.maps); })
      .catch(function(e) {
        console.error('[S2T] fetch failed: ' + e.message);
        document.body && (document.body.style.visibility = 'visible');
      });
  }

  window.__s2t = {
    get mode() { return defaultMode(); },
    toggle: function() {
      ctx.mode = defaultMode() === HANT ? HANS : HANT;
      savePref();
      apply(ctx.mode);
    }
  };
})();
</script>
