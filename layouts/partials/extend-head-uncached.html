<script>
(function() {
  var stats = window.__umamiStats;
  if (!stats || !stats.cfg.enable) return;

  var cfg = stats.cfg;

  function spanIdToUrl(id) {
    var raw = id.slice(6);

    if (raw === "home" || raw === "_index.md" || raw === "" || raw === "/") return "/";

    if (raw.startsWith("taxonomy_")) return "/" + raw.slice(9) + "/";

    if (raw.startsWith("term_")) {
      var t = raw.slice(5);
      var parts = t.split("/");
      if (parts.length > 1) return "/" + parts[0] + "/" + parts[1] + "/";
      return "/tags/" + t + "/";
    }

    var p = raw;
    p = p.replace(/(_?index)(\.[a-zA-Z-]+)?\.md$/, "");
    p = p.replace(/\.md$/, "");
    if (!p || p === "/") return "/";
    if (!p.startsWith("/")) p = "/" + p;
    if (!p.endsWith("/")) p = p + "/";
    return p;
  }

  function addLangPrefix(baseWithoutLeading, lang) {
    if (!lang) return null;
    var v = "/" + lang.toLowerCase() + "/" + baseWithoutLeading;
    return v.replace(/\/+/g, "/");
  }

  function makeLangUrls(baseUrl) {
    var urls = [baseUrl];
    if (!cfg.autoSum || !cfg.langCodes.length) return urls;
    var baseWithoutLeading = baseUrl.replace(/^\//, "");

    // default language with prefix (e.g. /zh-tw/path/)
    var dflt = addLangPrefix(baseWithoutLeading, cfg.defaultLang);
    if (dflt && dflt !== baseUrl) urls.push(dflt);

    // other languages with prefix
    for (var i = 0; i < cfg.langCodes.length; i++) {
      var lc = cfg.langCodes[i];
      if (!lc) continue;
      var variant = addLangPrefix(baseWithoutLeading, lc);
      if (variant) urls.push(variant);
    }
    return urls;
  }

  function processSpan(span, websiteId, token) {
    var id = span.getAttribute("id");
    if (!id || !id.startsWith("views_")) return;

    var url = spanIdToUrl(id);
    if (!url) return;

    var urls = makeLangUrls(url);
    var promises = urls.map(function(u) {
      return stats.fetchPageviews(websiteId, token, u)["catch"](function() { return 0; });
    });

    Promise.all(promises).then(function(results) {
      var total = 0;
      for (var i = 0; i < results.length; i++) total += results[i];
      displayViews(span, total);
    })["catch"](function() {
      displayViews(span, 0);
    });
  }

  function displayViews(span, count) {
    ["animate-pulse","text-transparent","bg-neutral-300","dark:bg-neutral-400","inline-block","max-h-3","rounded-full","mt-[-2px]","align-middle"].forEach(function(c) {
      span.classList.remove(c);
    });
    span.textContent = count;
    span.title = "views";
  }

  function scanAndProcess() {
    var spans = document.querySelectorAll('span[id^="views_"][title="views"]');
    if (!spans.length) return;

    stats.getShareToken().then(function(t) {
      spans.forEach(function(span) {
        if (span.textContent.trim() === "loading") {
          processSpan(span, t.websiteId, t.token);
        }
      });
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", scanAndProcess);
  } else {
    scanAndProcess();
  }

  new MutationObserver(function() {
    scanAndProcess();
  }).observe(document.body, { subtree: true, childList: true, attributes: false });
})();

/* ---- geo-block: hide pages/cards for specific countries ---- */
(function() {
  var notsafe = {{ if .Params.notsafeForArea }}{{ .Params.notsafeForArea | jsonify }}{{ else }}null{{ end }};
  var cache = window.__visitorCountry;

  function doBlock(country) {
    if (!country) return;
    // page-level block
    if (notsafe && notsafe.indexOf(country) !== -1) {
      var els = document.querySelectorAll("main, article:first-of-type");
      for (var ei = 0; ei < els.length; ei++) {
        var el = els[ei];
        if (el.querySelector('[data-notsafe]')) continue;
        el.innerHTML = '<div class="p-8 text-center text-neutral-500"><p>⚠️ 内容在当地不可用</p></div>';
      }
    }
    // card-level block
    var cards = document.querySelectorAll('[data-notsafe]');
    for (var ci = 0; ci < cards.length; ci++) {
      try {
        var blocked = JSON.parse(cards[ci].getAttribute('data-notsafe'));
        if (blocked.indexOf(country) !== -1) cards[ci].style.display = 'none';
      } catch(e) {}
    }
  }

  if (cache) {
    doBlock(cache);
  } else {
    fetch('https://www.cloudflare.com/cdn-cgi/trace')
      .then(function(r) { return r.text(); })
      .then(function(text) {
        var m = text.match(/^loc=(.+)$/m);
        var country = m ? m[1].trim() : '';
        window.__visitorCountry = country;
        doBlock(country);
      })
      .catch(function() {});
  }
})();

/* ---- S2T: simplified↔traditional with visual badge ---- */
(function() {
  var lang = (document.documentElement.getAttribute('lang') || '').toLowerCase();
  if (!lang.match(/^zh(-|$)/)) return;

  var inZhSg = /^\/zh-sg(\/|$)/.test(location.pathname);
  var ctx = window.__s2tCtx || {};

  function resolveMode() {
    var pref = ctx.mode;
    if (pref === 'fan' || pref === 'shu') return pref;
    return inZhSg ? 'shu' : 'fan';
  }

  var style = document.createElement('style');
  style.textContent = 'body{visibility:hidden}';
  document.head.appendChild(style);

  function buildMaps(text) {
    var s2t = {}, t2s = {}, lines = text.split('\n'), i, p;
    for (i = 0; i < lines.length; i++) {
      p = lines[i].split(',');
      if (p.length === 2) {
        var t = p[0].trim(), s = p[1].trim();
        if (t && s && t !== s) { s2t[s] = t; t2s[t] = s; }
      }
    }
    window.__s2tMap = s2t;
    window.__t2sMap = t2s;
    ctx.maps = { s2t: s2t, t2s: t2s };
  }

  function walk(root, map) {
    var stack = [root], el, i, node, text, out, ch, tag;
    while (stack.length) {
      el = stack.pop();
      if (el.nodeType === 3) {
        text = el.nodeValue; out = '';
        for (i = 0; i < text.length; i++) { ch = text[i]; out += map[ch] || ch; }
        if (out !== text) el.nodeValue = out;
      } else if (el.nodeType === 1) {
        tag = el.nodeName;
        if (/^(SCRIPT|STYLE|TEXTAREA|PRE|CODE)$/.test(tag)) continue;
        node = el.firstChild;
        while (node) { stack.push(node); node = node.nextSibling; }
      }
    }
  }

  function applyMode(mode) {
    var isFan = mode === 'fan';
    var map = isFan ? ctx.maps.s2t : ctx.maps.t2s;
    if (document.body) {
      if (map) walk(document.body, map);
      document.body.style.visibility = 'visible';
    } else {
      document.addEventListener('DOMContentLoaded', function() {
        if (map) walk(document.body, map);
        document.body.style.visibility = 'visible';
      });
    }
  }

  function ensureBadge() {
    if (document.getElementById('__s2t_badge')) return;
    var b = document.createElement('button');
    b.id = '__s2t_badge';
    b.title = '简繁切换';
    b.style.cssText = 'position:fixed;bottom:1rem;right:1rem;z-index:9999;width:2.5rem;height:2.5rem;border-radius:50%;border:1px solid #d4d4d8;background:var(--bg,#fff);color:var(--fg,#333);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.75;transition:opacity .2s;box-shadow:0 2px 8px rgba(0,0,0,.12)';
    b.onmouseover = function() { b.style.opacity = '1'; };
    b.onmouseout  = function() { b.style.opacity = '.75'; };
    b.onclick = function() {
      ctx.mode = ctx.mode === 'fan' ? 'shu' : 'fan';
      ctx.persist = true;
      try { localStorage.setItem('__s2t', JSON.stringify({ mode: ctx.mode })); } catch(e) {}
      applyMode(ctx.mode);
      updateBadge(ctx.mode);
    };
    document.body.appendChild(b);
  }

  function updateBadge(mode) {
    var b = document.getElementById('__s2t_badge');
    if (b) b.textContent = mode === 'fan' ? '繁' : '简';
  }

  function init() {
    var maps = window.__s2tMap && window.__t2sMap
      ? { s2t: window.__s2tMap, t2s: window.__t2sMap }
      : ctx.maps;

    if (maps) {
      ctx.maps = maps;
      var mode = resolveMode();
      applyMode(mode);
      ensureBadge();
      updateBadge(mode);
    } else {
      fetch(window.__s2tUrl || '/translate-owo.txt')
        .then(function(r) { return r.text(); })
        .then(function(text) { buildMaps(text); })
        .then(function() {
          var mode = resolveMode();
          applyMode(mode);
          ensureBadge();
          updateBadge(mode);
        })
        .catch(function() {
          document.body && (document.body.style.visibility = 'visible');
          document.addEventListener('DOMContentLoaded', function() { document.body.style.visibility = 'visible'; });
        });
    }
  }

  // restore persisted preference
  try {
    var saved = JSON.parse(localStorage.getItem('__s2t') || '{}');
    if (saved.mode) { ctx.mode = saved.mode; ctx.persist = true; }
  } catch(e) {}

  window.__s2tCtx = ctx;
  init();
})();
</script>
